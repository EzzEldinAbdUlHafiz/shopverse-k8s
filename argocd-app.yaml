apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopverse-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/EzzEldinAbdUlHafiz/shopverse-k8s.git
    targetRevision: main
    path: helm/shopverse
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: shopverse
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true