apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopverse-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app: shopverse
    component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: shopverse
      component: frontend
  template:
    metadata:
      labels:
        app: shopverse
        component: frontend
    spec:
      serviceAccountName: shopverse-frontend-sa
      securityContext:
        fsGroup: 101
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: shopverse
                    component: frontend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: {{ .Values.frontend.port }}
              name: http
          resources:
            requests:
              memory: {{ .Values.frontend.resources.requests.memory }}
              cpu: {{ .Values.frontend.resources.requests.cpu }}
            limits:
              memory: {{ .Values.frontend.resources.limits.memory }}
              cpu: {{ .Values.frontend.resources.limits.cpu }}
          startupProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: shopverse-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app: shopverse
    component: frontend
spec:
  selector:
    app: shopverse
    component: frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      name: http
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: shopverse-frontend-pdb
  namespace: {{ .Values.global.namespace }}
  labels:
    app: shopverse
    component: frontend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: shopverse
      component: frontend